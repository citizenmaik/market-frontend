name: Breadth Snapshot

on:
  schedule:
    # 21:30 UTC werktags = nach US-Close (≈22:30 CET / 23:30 CEST)
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}   # manueller Start über den Actions-Tab

permissions:
  contents: write         # nötig, damit der Job breadth.json zurück committen darf

concurrency:
  group: breadth
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install yfinance pandas numpy lxml requests

      - name: Run breadth scanner
        run: python scripts/breadth_scan.py

      - name: Commit breadth.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- breadth.json; then
            echo "Keine Änderung an breadth.json – nichts zu committen."
          else
            git add breadth.json
            git commit -m "chore: breadth snapshot $(date -u +%Y-%m-%d)"
            git push
          fi
